version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pci_bot_postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: pcibot
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  bot:
    build: .
    container_name: pci_bot_app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://root:rootpassword@postgres:5432/pcibot?schema=public
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - BITRIX_API_BASE=${BITRIX_API_BASE}
      - WAHA_API_BASE=${WAHA_API_BASE}
      - PORT=3000
    depends_on:
      - postgres
    restart: always

volumes:
  pgdata:
